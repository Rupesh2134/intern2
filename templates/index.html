<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="container">
        <h1>Heart Disease Prediction</h1>
        <p>Enter patient health information to estimate heart disease risk.</p>
        <form method="post">
            <div class="grid">
                <label>Age<input type="number" name="age" min="1" max="120" step="1" required /></label>
                <label>Sex (0=Female, 1=Male)<input type="number" name="sex" min="0" max="1" step="1" required /></label>
                <label>Chest Pain Type (1-4)<input type="number" name="cp" min="1" max="4" step="1" required /></label>
                <label>Resting BP<input type="number" name="trestbps" min="50" max="250" step="1" required /></label>
                <label>Cholesterol<input type="number" name="chol" min="100" max="600" step="1" required /></label>
                <label>Fasting Blood Sugar (0/1)<input type="number" name="fbs" min="0" max="1" step="1" required /></label>
                <label>Resting ECG (0-2)<input type="number" name="restecg" min="0" max="2" step="1" required /></label>
                <label>Max Heart Rate<input type="number" name="thalach" min="60" max="220" step="1" required /></label>
                <label>Exercise Induced Angina (0/1)<input type="number" name="exang" min="0" max="1" step="1" required /></label>
                <label>ST Depression<input type="number" name="oldpeak" min="0" max="10" step="0.1" required /></label>
                <label>Slope (1-3)<input type="number" name="slope" min="1" max="3" step="1" required /></label>
                <label>Major Vessels (0-3)<input type="number" name="ca" min="0" max="3" step="1" required /></label>
                <label>Thalassemia (3,6,7)<input type="number" name="thal" min="3" max="7" step="1" required /></label>
            </div>
            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
            <div class="result">
                <h2>Prediction Result</h2>
                <p><strong>Heart Disease:</strong> {{ prediction }}</p>
                <p><strong>Probability Score:</strong> {{ probability }}</p>
                <p><strong>Recommendation:</strong> {{ recommendation }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
